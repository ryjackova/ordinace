<script>
    const today = new Date().getDay(); // 0 = neděle
    const map = {
        1: 1, // Po
        2: 2,
        3: 3,
        4: 4,
        5: 5,
    };
    const todayId = map[today];
    if (todayId) {
        document.querySelectorAll(".hours-table .row").forEach((row, i) => {
            if (i === todayId - 1) {
                row.classList.add("active");
            }
        });
    }
</script>
